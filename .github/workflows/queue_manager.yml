name: Fetch Data and Call Function

on:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  fetch-and-call:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          pip install requests pandas supabase

      - name: Fetch data and call function
        run: |
          python -c "
            print('Hello, Action!')
          "
